# secrets.yaml
#
# WARNING: This file contains base64-ENCODED (NOT encrypted) placeholder
# credentials for local/demo bootstrap purposes only. Base64 is trivially
# reversible and provides zero confidentiality.
#
# For a production on-prem cluster, replace this manifest with one of:
#   - Sealed Secrets (bitnami-labs/sealed-secrets) so encrypted secrets can
#     be safely committed to Git and decrypted only by the controller
#     running in-cluster.
#   - HashiCorp Vault + the Vault Agent Injector / External Secrets Operator.
#   - `kubectl create secret generic ... --from-literal=...` run manually
#     against the cluster (never committed to source control).
#
# The values below decode to:
#   POSTGRES_USER=taskadmin
#   POSTGRES_PASSWORD=S3cureP@ssw0rd!ChangeInProd
#   POSTGRES_DB=taskmanager
apiVersion: v1
kind: Secret
metadata:
  name: taskmanager-db-secret
  namespace: taskmanager
  labels:
    app.kubernetes.io/part-of: secure-task-manager
type: Opaque
data:
  POSTGRES_USER: dGFza2FkbWlu
  POSTGRES_PASSWORD: UzNjdXJlUEBzc3cwcmQhQ2hhbmdlSW5Qcm9k
  POSTGRES_DB: dGFza21hbmFnZXI=
