# backend-deployment.yaml
# FastAPI backend tier. Pulls its image from the registry hosted on the
# devsecops-mothership VM (localhost:5000 on that host; reachable from the
# ESXi worker nodes as <mothership-ip>:5000 - see README for insecure
# registry / containerd configuration notes).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: taskmanager
  labels:
    app: backend
    tier: api
    app.kubernetes.io/part-of: secure-task-manager
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
        tier: api
        app.kubernetes.io/part-of: secure-task-manager
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/healthz"
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
      containers:
        - name: backend
          # Replace <MOTHERSHIP_IP> with the actual mothership VM address
          # reachable from the ESXi worker nodes, or use the DNS name
          # configured for the mothership registry.
          image: :naman96/secure-task-manager-backend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
              name: http
          securityContext:
            runAsNonRoot: true
            runAsUser: 10001
            runAsGroup: 10001
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          envFrom:
            - configMapRef:
                name: taskmanager-config
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: taskmanager-db-secret
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: taskmanager-db-secret
                  key: POSTGRES_PASSWORD
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: taskmanager-db-secret
                  key: POSTGRES_DB
          volumeMounts:
            - name: tmp
              mountPath: /app/tmp
            - name: var-tmp
              mountPath: /tmp
          resources:
            requests:
              cpu: "150m"
              memory: "192Mi"
            limits:
              cpu: "750m"
              memory: "512Mi"
          startupProbe:
            httpGet:
              path: /healthz
              port: 8000
            failureThreshold: 30
            periodSeconds: 2
          readinessProbe:
            httpGet:
              path: /ready
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
      volumes:
        - name: tmp
          emptyDir: {}
        - name: var-tmp
          emptyDir: {}
      restartPolicy: Always
