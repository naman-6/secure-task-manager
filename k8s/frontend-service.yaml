# frontend-service.yaml
# Bare-metal on-prem clusters have no cloud LoadBalancer controller, so the
# frontend is exposed via a NodePort. Kubernetes opens this same port
# (30080) on EVERY node in the cluster (the 1 master + 2 ESXi workers).
# End users can reach the app at:
#   http://<any-worker-node-ip>:30080
apiVersion: v1
kind: Service
metadata:
  name: frontend-service
  namespace: taskmanager
  labels:
    app: frontend
    tier: web
    app.kubernetes.io/part-of: secure-task-manager
spec:
  type: NodePort
  selector:
    app: frontend
  ports:
    - name: http
      port: 80
      targetPort: 8080
      nodePort: 30080
      protocol: TCP
