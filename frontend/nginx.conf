# nginx.conf
# Serves the compiled React (Vite) SPA and reverse-proxies /api/ requests
# to the backend service. The upstream host "backend" resolves via:
#   - Docker Compose: the "backend" service DNS name on the compose network
#   - Kubernetes: the "backend-service" ClusterIP Service DNS name (see
#     the BACKEND_UPSTREAM build/runtime note below)
#
# NOTE: Because Nginx config directives cannot easily be templated without
# extra tooling, this file uses the Kubernetes-internal DNS name
# "backend-service" as the canonical upstream. The docker-compose.yml file
# creates a network alias "backend-service" for the backend container so
# the exact same nginx.conf works unmodified in both environments.

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /tmp/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    client_body_temp_path /tmp/client_temp;
    proxy_temp_path       /tmp/proxy_temp;
    fastcgi_temp_path     /tmp/fastcgi_temp;
    uwsgi_temp_path       /tmp/uwsgi_temp;
    scgi_temp_path        /tmp/scgi_temp;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                     '$status $body_bytes_sent "$http_referer" '
                     '"$http_user_agent" "$http_x_forwarded_for"';
    access_log /var/log/nginx/access.log main;

    sendfile        on;
    keepalive_timeout  65;
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Security headers (defense-in-depth; complements NetworkPolicies)
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    server {
        listen 8080;
        server_name _;
        root /usr/share/nginx/html;
        index index.html;

        # Health endpoint for k8s probes on the frontend container itself.
        location /healthz {
            access_log off;
            return 200 "ok\n";
            add_header Content-Type text/plain;
        }

        # Reverse proxy all API traffic to the backend Service.
        # Works in both docker-compose (network alias) and Kubernetes
        # (Service DNS) because both resolve "backend-service".
        # NOTE: proxy_pass target retains the "/api/" prefix so that
        # "/api/v1/tasks" is forwarded unchanged to the backend's own
        # "/api/v1/tasks" route (avoids a doubled /api/v1/v1 prefix).
        location /api/ {
            proxy_pass http://backend-service:8000/api/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 5s;
            proxy_read_timeout 30s;
        }

        # SPA fallback: any unmatched route serves index.html so React
        # Router-style client-side navigation works on refresh.
        location / {
            try_files $uri $uri/ /index.html;
        }

        location ~* \.(?:css|js|svg|woff2?|ttf|eot|ico|png|jpg|jpeg|gif)$ {
            expires 7d;
            add_header Cache-Control "public, immutable";
            try_files $uri =404;
        }
    }
}
