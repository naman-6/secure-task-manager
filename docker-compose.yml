version: "3.9"

# Secure Task & Asset Manager - Local Development Stack
# Intended to be run directly on the devsecops-mothership VM for fast
# iteration before images are pushed through the Jenkins pipeline to the
# on-prem Kubernetes cluster.

networks:
  taskmanager-net:
    driver: bridge

volumes:
  postgres-data:
    driver: local

services:
  postgres:
    image: postgres:16-alpine
    container_name: taskmanager-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: taskadmin
      POSTGRES_PASSWORD: ChangeMe_LocalDevOnly!
      POSTGRES_DB: taskmanager
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - taskmanager-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U taskadmin -d taskmanager"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: localhost:5000/taskmanager-backend:local
    container_name: taskmanager-backend
    restart: unless-stopped
    # network_alias "backend-service" mirrors the Kubernetes Service name so
    # nginx.conf's proxy_pass target works identically in both environments.
    networks:
      taskmanager-net:
        aliases:
          - backend-service
    environment:
      POSTGRES_USER: taskadmin
      POSTGRES_PASSWORD: ChangeMe_LocalDevOnly!
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DB: taskmanager
      CORS_ALLOWED_ORIGINS: "http://localhost:8081,http://localhost:5173"
      LOG_LEVEL: INFO
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      # Using native Python urllib to check health safely inside a slim image without installing curl
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/healthz')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: localhost:5000/taskmanager-frontend:local
    container_name: taskmanager-frontend
    restart: unless-stopped
    networks:
      - taskmanager-net
    ports:
      - "8081:8080"
    depends_on:
      backend:
        condition: service_healthy
